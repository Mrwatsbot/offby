<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>OffBy - The Daily Globe Game</title>
<meta name="description" content="Spin the globe, drop your pin where you think it is, and see how many km off you were. 5 places a day.">
<meta property="og:title" content="OffBy - The Daily Globe Game">
<meta property="og:description" content="How well do you know the world? Spin the globe, drop a pin, see how far off you were.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127757;</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5/dist/maplibre-gl.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@5/dist/maplibre-gl.min.css" rel="stylesheet">
<style>
:root{--card:#181c25ee;--card2:#1f2430;--text:#e8eaf0;--dim:#9aa2b5;--accent:#fbbf24;--accent2:#f59e0b;--green:#34d399;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#05070c;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
#map{position:fixed;inset:0}
.maplibregl-ctrl-bottom-right{opacity:.55}
.ui{position:fixed;z-index:10}
#brand{top:calc(12px + env(safe-area-inset-top));left:14px;background:var(--card);backdrop-filter:blur(8px);border:1px solid #2a3142;border-radius:99px;padding:7px 14px;font-weight:800;letter-spacing:1.5px;font-size:15px;user-select:none}
#brand span{color:var(--accent)}
#brand small{color:var(--dim);font-weight:600;letter-spacing:0;margin-left:6px}
#prompt{top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);max-width:min(92vw,440px);background:var(--card);backdrop-filter:blur(8px);border:1px solid #2a3142;border-radius:16px;padding:12px 20px;text-align:center;display:none}
#prompt .k{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
#prompt .q{font-size:19px;font-weight:750;line-height:1.25;margin-top:3px}
#lockwrap{bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:min(92vw,380px);display:none}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1204;border:none;border-radius:14px;font-size:17px;font-weight:800;padding:15px;cursor:pointer;letter-spacing:.5px;box-shadow:0 6px 24px #0009}
.btn:disabled{background:var(--card);color:var(--dim);border:1px solid #2a3142}
.btn:active:not(:disabled){transform:scale(.98)}
#sheet{bottom:0;left:0;right:0;display:flex;justify-content:center;pointer-events:none;transform:translateY(110%);transition:transform .45s cubic-bezier(.2,1.1,.3,1)}
#sheet.up{transform:translateY(0)}
#sheet .inner{pointer-events:auto;width:min(96vw,480px);background:var(--card);backdrop-filter:blur(10px);border:1px solid #2a3142;border-radius:20px 20px 0 0;padding:18px 20px calc(18px + env(safe-area-inset-bottom));text-align:center}
.remoji{font-size:40px;animation:pop .45s cubic-bezier(.2,1.6,.4,1)}
@keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
.km{font-size:24px;font-weight:800;margin-top:2px}
.km span{color:var(--accent)}
.pt{font-size:14px;color:var(--dim);margin-top:2px}
.pt b{color:var(--text);font-size:17px}
.fact{background:var(--card2);border-radius:12px;padding:11px 14px;font-size:13.5px;color:#c2c9d8;line-height:1.45;margin-top:12px;text-align:left}
.fact:before{content:"\1F4A1  "}
#sheet .btn{margin-top:14px}
#panelwrap{inset:0;display:none;align-items:center;justify-content:center;background:#05070c88;backdrop-filter:blur(3px)}
#panel{width:min(92vw,420px);max-height:86vh;overflow:auto;background:var(--card);backdrop-filter:blur(10px);border:1px solid #2a3142;border-radius:20px;padding:24px;text-align:center}
.big{font-size:50px;font-weight:800}
.big small{font-size:19px;color:var(--dim)}
.grid{font-size:28px;letter-spacing:4px;margin:8px 0 2px}
.totkm{color:var(--dim);font-size:14px;margin-bottom:4px}
.totkm b{color:var(--text)}
.statrow{display:flex;justify-content:space-around;margin:14px 0 2px}
.stat .v{font-size:21px;font-weight:800}
.stat .l{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.lvlbox{margin-top:14px;background:var(--card2);border-radius:12px;padding:12px 14px}
.lvltop{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:7px}
.lvltop .nm{color:var(--accent)}
.lvltop .xp{color:var(--dim);font-weight:600}
.lvlbar{height:8px;background:#2c3344;border-radius:4px;overflow:hidden}
.lvlfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 1.2s ease}
.lvlup{margin-top:10px;color:var(--green);font-weight:800;font-size:14px;letter-spacing:1px;animation:pop .5s}
.count{color:var(--dim);font-size:13px;margin-top:12px}
.introlist{margin:12px 0 2px;line-height:2;color:#c2c9d8;font-size:15px;list-style:none;text-align:left;display:inline-block}
.streakline{color:var(--accent);font-weight:700;font-size:14px;margin-top:8px}
.ttl{font-size:20px;font-weight:750;margin-top:6px}
.k2{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--accent);color:#1a1204;font-weight:700;padding:10px 20px;border-radius:99px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
#toast.show{opacity:1}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#05070c;z-index:40;color:var(--dim);font-size:15px;flex-direction:column;gap:12px}
.spin3{width:38px;height:38px;border-radius:50%;border:3px solid #2a3142;border-top-color:var(--accent);animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.pulse{width:18px;height:18px;border-radius:50%;background:#34d39955;border:2px solid var(--green);animation:pulse 1.2s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 #34d39966}100%{box-shadow:0 0 0 16px #34d39900}}
</style>
</head>
<body>
<div id="map"></div>
<div id="loading"><div class="spin3"></div><div>Spinning up the globe&hellip;</div></div>
<div class="ui" id="brand">OFF<span>BY</span><small id="pno"></small></div>
<div class="ui" id="prompt"><div class="k" id="pk"></div><div class="q" id="pq"></div></div>
<div class="ui" id="lockwrap"><button class="btn" id="lock" disabled>Drop a pin first</button></div>
<div class="ui" id="sheet"><div class="inner" id="sheetin"></div></div>
<div class="ui" id="panelwrap"><div id="panel"></div></div>
<div id="toast">Copied!</div>
<script>
var API = 'https://guylqnfgfcfnmubvaedv.supabase.co/functions/v1/offby';
var STYLE_URL = 'https://tiles.openfreemap.org/styles/liberty';
var LEVELS = [
  { nm: 'Lost Tourist', at: 0 }, { nm: 'Backpacker', at: 500 }, { nm: 'Globetrotter', at: 1500 },
  { nm: 'Navigator', at: 3000 }, { nm: 'Cartographer', at: 5500 }, { nm: 'Atlas Brain', at: 9000 }
];
var NL = String.fromCharCode(10);
var D = null, map = null;
var state = 'boot';
var idx = 0, results = [];
var guessMarker = null, targetMarker = null, arcOn = false, spinOn = false;

function lsGet(){ try { return JSON.parse(localStorage.getItem('offby_v1')) || {}; } catch(e){ return {}; } }
function lsSet(o){ try { localStorage.setItem('offby_v1', JSON.stringify(o)); } catch(e){} }
var S = lsGet();
if (!S.cid) { S.cid = 'c' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
if (!S.hist) { S.hist = {}; }
if (!S.xp) { S.xp = 0; }
lsSet(S);

function localDate(){ var n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); }
var L = localDate();

function fmt(n){ return Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 }); }
function hav(la1, lo1, la2, lo2){
  var R = 6371, rad = Math.PI / 180;
  var dLa = (la2 - la1) * rad, dLo = (lo2 - lo1) * rad;
  var a = Math.sin(dLa/2) * Math.sin(dLa/2) + Math.cos(la1*rad) * Math.cos(la2*rad) * Math.sin(dLo/2) * Math.sin(dLo/2);
  return Math.round(2 * R * Math.asin(Math.sqrt(a)));
}
function pts(d){ return d <= 250 ? 100 : Math.max(0, Math.round(100 * Math.pow(0.5, (d - 250) / 900))); }
function emo(d){ return d <= 250 ? '🎯' : d <= 700 ? '🟢' : d <= 1500 ? '🟡' : d <= 3000 ? '🟠' : '🔴'; }
function levelFor(xp){ var i = LEVELS.length - 1; while (i > 0 && xp < LEVELS[i].at) i--; return i; }
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  setTimeout(function(){ t.className = ''; }, 1600);
}
function el(id){ return document.getElementById(id); }

function arcPoints(la1, lo1, la2, lo2, n){
  var rad = Math.PI / 180, deg = 180 / Math.PI;
  function v(la, lo){ var f = la * rad, l = lo * rad; return [Math.cos(f)*Math.cos(l), Math.cos(f)*Math.sin(l), Math.sin(f)]; }
  var A = v(la1, lo1), B = v(la2, lo2);
  var dot = Math.max(-1, Math.min(1, A[0]*B[0] + A[1]*B[1] + A[2]*B[2]));
  var om = Math.acos(dot);
  var out = [], prevLo = lo1;
  for (var i = 0; i <= n; i++) {
    var t = i / n, p;
    if (om < 1e-6) { p = A; }
    else {
      var s1 = Math.sin((1-t)*om) / Math.sin(om), s2 = Math.sin(t*om) / Math.sin(om);
      p = [A[0]*s1 + B[0]*s2, A[1]*s1 + B[1]*s2, A[2]*s1 + B[2]*s2];
    }
    var la = Math.asin(Math.max(-1, Math.min(1, p[2]))) * deg;
    var lo = Math.atan2(p[1], p[0]) * deg;
    while (lo - prevLo > 180) lo -= 360;
    while (lo - prevLo < -180) lo += 360;
    prevLo = lo;
    out.push([lo, la]);
  }
  return out;
}

function startSpin(){
  spinOn = true;
  function step(){
    if (!spinOn || !map) return;
    var c = map.getCenter();
    c.lng += 0.045;
    map.setCenter(c);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function stopSpin(){ spinOn = false; }

function clearRound(){
  if (guessMarker) { guessMarker.remove(); guessMarker = null; }
  if (targetMarker) { targetMarker.remove(); targetMarker = null; }
  if (arcOn) {
    if (map.getLayer('arcline')) map.removeLayer('arcline');
    if (map.getSource('arc')) map.removeSource('arc');
    arcOn = false;
  }
}

function showIntro(){
  state = 'intro';
  el('panel').innerHTML =
    '<div style="font-size:44px">🌍</div>' +
    '<div class="k2">Puzzle #' + D.n + '</div>' +
    '<div class="ttl">Find 5 places on the globe</div>' +
    '<ul class="introlist">' +
    '<li>🌐 Spin and zoom the globe freely</li>' +
    '<li>📍 Tap to drop your pin, then lock it in</li>' +
    '<li>🎯 Land within 250 km for a bullseye</li>' +
    '</ul>' +
    '<button class="btn" id="start" style="margin-top:14px">Play</button>';
  el('panelwrap').style.display = 'flex';
  document.getElementById('start').onclick = function(){
    el('panelwrap').style.display = 'none';
    stopSpin();
    map.easeTo({ center: [15, 20], zoom: 1.3, duration: 800 });
    showTarget();
  };
}

function showTarget(){
  state = 'guess';
  clearRound();
  var q = D.questions[idx];
  el('pk').textContent = 'Place ' + (idx+1) + ' of 5';
  el('pq').textContent = 'Where is ' + q.n + '?';
  el('prompt').style.display = 'block';
  var b = el('lock');
  b.disabled = true; b.textContent = 'Drop a pin first';
  el('lockwrap').style.display = 'block';
  el('sheet').classList.remove('up');
}

function placePin(lngLat){
  if (state !== 'guess') return;
  if (!guessMarker) {
    guessMarker = new maplibregl.Marker({ color: '#fbbf24' }).setLngLat(lngLat).addTo(map);
  } else {
    guessMarker.setLngLat(lngLat);
  }
  var b = el('lock');
  b.disabled = false; b.textContent = 'Lock it in';
}

function lockIn(){
  if (state !== 'guess' || !guessMarker) return;
  state = 'reveal';
  var q = D.questions[idx];
  var g = guessMarker.getLngLat();
  var gla = g.lat, glo = ((g.lng + 180) % 360 + 360) % 360 - 180;
  var d = hav(gla, glo, q.la, q.lo);
  var p = pts(d);
  results.push({ d: d, p: p, e: emo(d) });

  var elp = document.createElement('div');
  elp.className = 'pulse';
  targetMarker = new maplibregl.Marker({ element: elp }).setLngLat([q.lo, q.la]).addTo(map);

  var pts64 = arcPoints(gla, glo, q.la, q.lo, 64);
  map.addSource('arc', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [pts64[0]] } } });
  map.addLayer({ id: 'arcline', type: 'line', source: 'arc',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': '#fbbf24', 'line-width': 2.5, 'line-opacity': 0.9 } });
  arcOn = true;
  var t0 = null;
  function grow(ts){
    if (!t0) t0 = ts;
    var f = Math.min(1, (ts - t0) / 900);
    var upto = Math.max(1, Math.round(f * 64));
    if (arcOn && map.getSource('arc')) {
      map.getSource('arc').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: pts64.slice(0, upto + 1) } });
      if (f < 1) requestAnimationFrame(grow);
    }
  }
  requestAnimationFrame(grow);

  var bounds = new maplibregl.LngLatBounds();
  for (var i = 0; i < pts64.length; i += 4) bounds.extend(pts64[i]);
  bounds.extend(pts64[64]);
  map.fitBounds(bounds, { padding: { top: 110, bottom: 260, left: 60, right: 60 }, maxZoom: (d <= 100 ? 8.5 : 5.2), duration: 1300 });

  el('prompt').style.display = 'none';
  el('lockwrap').style.display = 'none';
  el('sheetin').innerHTML =
    '<div class="remoji">' + results[idx].e + '</div>' +
    '<div class="km">Off by <span>' + fmt(d) + ' km</span></div>' +
    '<div class="pt"><b>+' + p + '</b> / 100' + (d <= 25 ? ' &middot; <b style="color:var(--green)">PERFECT</b>' : '') + '</div>' +
    '<div class="fact">' + q.f + '</div>' +
    '<button class="btn" id="next">' + (idx < 4 ? 'Next place' : 'See my score') + '</button>';
  el('sheet').classList.add('up');
  el('next').onclick = function(){
    idx++;
    el('sheet').classList.remove('up');
    if (idx < 5) {
      map.easeTo({ center: [15, 20], zoom: 1.3, duration: 900 });
      setTimeout(showTarget, 250);
    } else {
      finish();
    }
  };
}

function finish(){
  state = 'end';
  clearRound();
  var total = 0, totkm = 0, grid = '';
  for (var i = 0; i < results.length; i++) { total += results[i].p; totkm += results[i].d; grid += results[i].e; }
  var isToday = (D.d === L);
  var prevLvl = levelFor(S.xp || 0);
  if (isToday) {
    var y = new Date(Date.parse(D.d) - 86400000).toISOString().slice(0,10);
    S.streak = (S.last === y) ? (S.streak || 0) + 1 : 1;
    S.best = Math.max(S.best || 0, total);
    S.last = D.d;
  }
  S.xp = (S.xp || 0) + total;
  var newLvl = levelFor(S.xp);
  S.hist[D.d] = { s: total, g: grid, km: totkm };
  lsSet(S);
  fetch(API + '?api=play', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ d: D.d, score: total, cid: S.cid, grid: grid })
  }).then(function(r){ return r.json(); }).then(function(st){
    S.hist[D.d].st = st; lsSet(S);
    showEnd(total, grid, totkm, st, newLvl > prevLvl);
  }).catch(function(){ showEnd(total, grid, totkm, null, newLvl > prevLvl); });
}

function lvlHtml(){
  var xp = S.xp || 0, li = levelFor(xp);
  var cur = LEVELS[li], nxt = LEVELS[li+1];
  var pct = nxt ? Math.min(100, Math.round(100 * (xp - cur.at) / (nxt.at - cur.at))) : 100;
  return '<div class="lvlbox"><div class="lvltop"><span class="nm">' + cur.nm + '</span>' +
    '<span class="xp">' + (nxt ? fmt(xp) + ' / ' + fmt(nxt.at) + ' xp' : fmt(xp) + ' xp &middot; max level') + '</span></div>' +
    '<div class="lvlbar"><div class="lvlfill" style="width:' + pct + '%"></div></div></div>';
}

function showEnd(total, grid, totkm, st, leveledUp){
  el('prompt').style.display = 'none';
  el('lockwrap').style.display = 'none';
  el('sheet').classList.remove('up');
  map.easeTo({ center: [15, 20], zoom: 1.2, duration: 1000 });
  startSpin();
  var h = '<div class="k2">Puzzle #' + D.n + ' complete</div>' +
    '<div class="big" id="cnt">0<small> / 500</small></div>' +
    '<div class="grid">' + grid + '</div>' +
    (totkm != null ? '<div class="totkm"><b>' + fmt(totkm) + ' km</b> off in total</div>' : '');
  if (st && st.plays > 1) {
    h += '<div class="statrow">' +
      '<div class="stat"><div class="v">' + st.beat + '%</div><div class="l">players beaten</div></div>' +
      '<div class="stat"><div class="v">' + st.avg + '</div><div class="l">average score</div></div>' +
      '<div class="stat"><div class="v">' + st.plays + '</div><div class="l">plays today</div></div></div>';
  }
  if (S.streak > 1 && D.d === L) h += '<div class="streakline">🔥 ' + S.streak + ' day streak</div>';
  h += lvlHtml();
  if (leveledUp) h += '<div class="lvlup">⭐ LEVEL UP &mdash; ' + LEVELS[levelFor(S.xp)].nm + '!</div>';
  h += '<button class="btn" id="share" style="margin-top:14px">Share result</button>' +
    '<div class="count" id="count"></div>';
  el('panel').innerHTML = h;
  el('panelwrap').style.display = 'flex';
  var t0 = null;
  function count(ts){
    if (!t0) t0 = ts;
    var f = Math.min(1, (ts - t0) / 900);
    var c = el('cnt');
    if (c) c.innerHTML = Math.round(total * (0.5 - Math.cos(Math.PI * f) / 2)) + '<small> / 500</small>';
    if (f < 1) requestAnimationFrame(count);
  }
  requestAnimationFrame(count);
  el('share').onclick = function(){
    var txt = 'OffBy #' + D.n + ' - ' + total + '/500' + NL + grid + NL +
      (totkm != null ? fmt(totkm) + ' km off in total' + NL : '') + location.origin + location.pathname;
    if (navigator.share) { navigator.share({ text: txt }).catch(function(){}); }
    else if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){ toast('Copied!'); }); }
  };
  tick();
  setInterval(tick, 1000);
}

function tick(){
  var e = el('count');
  if (!e) return;
  var now = new Date();
  var mid = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  var s = Math.floor((mid - now) / 1000);
  var hh = Math.floor(s/3600), mm = Math.floor((s%3600)/60), ss = s%60;
  e.textContent = 'Next puzzle in ' + String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

function boot(){
  Promise.all([
    fetch(STYLE_URL).then(function(r){ return r.json(); }),
    fetch(API + '?api=puzzle&d=' + L).then(function(r){ return r.json(); })
  ]).then(function(res){
    var style = res[0];
    D = res[1];
    el('pno').textContent = '#' + D.n;
    style.layers = style.layers.filter(function(l){ return l.type !== 'symbol'; });
    for (var i = 0; i < style.layers.length; i++) {
      if (style.layers[i].id === 'natural_earth') {
        style.layers[i].paint['raster-opacity'] = ['interpolate', ['exponential', 1.5], ['zoom'], 0, 0.7, 7, 0.45];
      }
    }
    map = new maplibregl.Map({
      container: 'map',
      style: style,
      center: [15, 20],
      zoom: 1.2,
      attributionControl: { compact: true },
      canvasContextAttributes: { antialias: true }
    });
    map.on('style.load', function(){
      if (map.setProjection) map.setProjection({ type: 'globe' });
    });
    map.on('click', function(e){ placePin(e.lngLat); });
    el('lock').onclick = lockIn;
    map.on('load', function(){
      el('loading').style.display = 'none';
      var done = S.hist[D.d];
      if (done && typeof done.km === 'number') {
        startSpin();
        showEnd(done.s, done.g, done.km, done.st || null, false);
      } else {
        startSpin();
        showIntro();
      }
    });
    map.on('error', function(){});
  }).catch(function(){
    el('loading').innerHTML = '<div style="font-size:40px">😵</div><div>Could not load the globe. Check your connection and refresh.</div>';
  });
}
boot();
</script>
</body>
</html>
