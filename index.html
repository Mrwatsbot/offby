<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>OffBy - The Daily Estimation Game</title>
<meta name="description" content="5 questions a day. Estimate the answer. The closer you get, the more you score. A new puzzle every day.">
<meta property="og:title" content="OffBy - The Daily Estimation Game">
<meta property="og:description" content="How good are your guesses? 5 questions, new puzzle daily.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127919;</text></svg>">
<style>
:root{--bg:#0e1015;--card:#181c25;--card2:#1f2430;--text:#e8eaf0;--dim:#8b93a7;--accent:#fbbf24;--accent2:#f59e0b;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.wrap{width:100%;max-width:480px;padding:20px 16px 40px}
header{text-align:center;padding:18px 0 6px}
.logo{font-size:34px;font-weight:800;letter-spacing:2px}
.logo span{color:var(--accent)}
.sub{color:var(--dim);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid #262c3a;border-radius:16px;padding:22px;margin-top:18px}
.qnum{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.qtext{font-size:21px;font-weight:650;line-height:1.35;margin:10px 0 4px}
.unit{color:var(--dim);font-size:14px;margin-bottom:14px}
input[type=text]{width:100%;background:var(--card2);border:2px solid #2c3344;border-radius:12px;color:var(--text);font-size:22px;padding:13px 16px;outline:none;text-align:center;font-weight:600}
input[type=text]:focus{border-color:var(--accent)}
.hint{color:var(--dim);font-size:12px;text-align:center;margin-top:8px}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1204;border:none;border-radius:12px;font-size:17px;font-weight:800;padding:14px;margin-top:14px;cursor:pointer;letter-spacing:.5px}
.btn:active{transform:scale(.98)}
.reveal{text-align:center}
.remoji{font-size:44px;margin:2px 0 8px}
.rpts{font-size:30px;font-weight:800}
.rpts small{font-size:15px;color:var(--dim);font-weight:600}
.ranswer{margin:12px 0 2px;font-size:15px;color:var(--dim)}
.ranswer b{color:var(--text);font-size:19px}
.rguess{font-size:13px;color:var(--dim);margin-bottom:10px}
.fact{background:var(--card2);border-radius:12px;padding:12px 14px;font-size:14px;color:#c2c9d8;line-height:1.45;margin-top:12px;text-align:left}
.fact:before{content:"&#128161; ";}
.dots{display:flex;gap:7px;justify-content:center;margin-top:16px}
.dot{width:9px;height:9px;border-radius:50%;background:#2c3344}
.dot.on{background:var(--accent)}
.big{font-size:52px;font-weight:800;text-align:center}
.big small{font-size:20px;color:var(--dim)}
.grid{font-size:30px;text-align:center;letter-spacing:4px;margin:10px 0}
.statrow{display:flex;justify-content:space-around;margin:16px 0 4px}
.stat{text-align:center}
.stat .v{font-size:22px;font-weight:800}
.stat .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.count{text-align:center;color:var(--dim);font-size:13px;margin-top:14px}
footer{color:#4d5468;font-size:12px;text-align:center;padding:18px 0 30px;line-height:1.7}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#1a1204;font-weight:700;padding:10px 20px;border-radius:99px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.center{text-align:center}
.introlist{margin:14px 0 4px;line-height:2;color:#c2c9d8;font-size:15px;list-style:none}
.streakline{color:var(--accent);font-weight:700;font-size:14px;text-align:center;margin-top:10px}
.loading{text-align:center;color:var(--dim);padding:40px 0;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="logo">OFF<span>BY</span></div>
<div class="sub" id="subtitle">The daily estimation game</div>
</header>
<div id="app"><div class="loading">Loading today's puzzle&hellip;</div></div>
<footer>A new puzzle every day at midnight, your time.<br>No account. No tracking. Just vibes and numbers.</footer>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
var API = 'https://guylqnfgfcfnmubvaedv.supabase.co/functions/v1/offby';
var app = document.getElementById('app');
var NL = String.fromCharCode(10);
var D = null;
var idx = 0, results = [];

function lsGet(){ try { return JSON.parse(localStorage.getItem('offby_v1')) || {}; } catch(e){ return {}; } }
function lsSet(o){ try { localStorage.setItem('offby_v1', JSON.stringify(o)); } catch(e){} }
var S = lsGet();
if (!S.cid) { S.cid = 'c' + Math.random().toString(36).slice(2) + Date.now().toString(36); lsSet(S); }
if (!S.hist) { S.hist = {}; lsSet(S); }

function localDate(){ var n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); }
var L = localDate();

function fmt(n){ return Number(n).toLocaleString('en-US', {maximumFractionDigits:3}); }
function parseNum(s){
  s = String(s).trim().toLowerCase().split(',').join('').split(' ').join('');
  var m = 1;
  if (s.slice(-1) === 'k') { m = 1e3; s = s.slice(0,-1); }
  else if (s.slice(-1) === 'm') { m = 1e6; s = s.slice(0,-1); }
  else if (s.slice(-1) === 'b') { m = 1e9; s = s.slice(0,-1); }
  var v = parseFloat(s);
  return isFinite(v) ? v * m : NaN;
}
function pts(guess, ans){
  if (!(guess > 0)) return 0;
  var r = Math.max(guess/ans, ans/guess);
  return Math.max(0, Math.round(100 * (1 - Math.log(r)/Math.log(10))));
}
function emoji(p){ return p >= 95 ? '🎯' : p >= 70 ? '🟩' : p >= 40 ? '🟨' : p >= 1 ? '🟧' : '🟥'; }
function dots(){
  var h = '<div class="dots">';
  for (var i = 0; i < 5; i++) h += '<div class="dot' + (i <= idx ? ' on' : '') + '"></div>';
  return h + '</div>';
}
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 1600);
}

function showIntro(){
  app.innerHTML = '<div class="card center">' +
    '<div style="font-size:44px">🎯</div>' +
    '<div style="font-size:20px;font-weight:750;margin-top:8px">Puzzle #' + D.n + '</div>' +
    '<ul class="introlist">' +
    '<li>📋 5 questions about the real world</li>' +
    '<li>🧠 No looking things up - just estimate</li>' +
    '<li>🎯 The closer you get, the more points</li>' +
    '</ul>' +
    '<button class="btn" id="start">Play</button></div>';
  document.getElementById('start').onclick = showQuestion;
}

function showQuestion(){
  var q = D.questions[idx];
  app.innerHTML = '<div class="card">' +
    '<div class="qnum">Question ' + (idx+1) + ' of 5</div>' +
    '<div class="qtext">' + q.q + '</div>' +
    '<div class="unit">Answer in ' + q.u + '</div>' +
    '<input type="text" id="guess" inputmode="decimal" autocomplete="off" placeholder="Your estimate">' +
    '<div class="hint">Tip: you can type 1.5k, 2m, 3b for big numbers</div>' +
    '<button class="btn" id="lock">Lock it in</button>' +
    dots() + '</div>';
  var inp = document.getElementById('guess');
  inp.focus();
  function submit(){
    var g = parseNum(inp.value);
    if (isNaN(g)) { inp.style.borderColor = 'var(--red)'; return; }
    var p = pts(g, q.a);
    results.push({ g: g, p: p, e: emoji(p) });
    showReveal(q, g, p);
  }
  document.getElementById('lock').onclick = submit;
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') submit(); });
}

function showReveal(q, g, p){
  var off = g > q.a ? 'over' : g < q.a ? 'under' : 'spot on';
  var ratio = Math.max(g/q.a, q.a/g);
  var offTxt = ratio < 1.005 ? 'Perfect!' : 'You were ' + (ratio < 2 ? Math.round((ratio-1)*100) + '% ' + off : fmt(Math.round(ratio*10)/10) + 'x ' + off);
  app.innerHTML = '<div class="card reveal">' +
    '<div class="remoji">' + emoji(p) + '</div>' +
    '<div class="rpts">+' + p + ' <small>/ 100</small></div>' +
    '<div class="ranswer">Answer: <b>' + fmt(q.a) + ' ' + q.u + '</b></div>' +
    '<div class="rguess">Your guess: ' + fmt(g) + ' &middot; ' + offTxt + '</div>' +
    '<div class="fact">' + q.f + '</div>' +
    '<button class="btn" id="next">' + (idx < 4 ? 'Next question' : 'See my score') + '</button>' +
    dots() + '</div>';
  document.getElementById('next').onclick = function(){
    idx++;
    if (idx < 5) showQuestion(); else finish();
  };
}

function finish(){
  var total = 0, grid = '';
  for (var i = 0; i < results.length; i++) { total += results[i].p; grid += results[i].e; }
  var isToday = (D.d === L);
  if (isToday) {
    var y = new Date(Date.parse(D.d) - 86400000).toISOString().slice(0,10);
    S.streak = (S.last === y) ? (S.streak || 0) + 1 : 1;
    S.best = Math.max(S.best || 0, total);
    S.last = D.d;
  }
  S.hist[D.d] = { s: total, g: grid };
  lsSet(S);
  fetch(API + '?api=play', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ d: D.d, score: total, cid: S.cid, grid: grid })
  }).then(function(r){ return r.json(); }).then(function(st){
    S.hist[D.d].st = st; lsSet(S);
    showEnd(total, grid, st);
  }).catch(function(){ showEnd(total, grid, null); });
}

function showEnd(total, grid, st){
  var h = '<div class="card center">' +
    '<div class="qnum">Puzzle #' + D.n + ' complete</div>' +
    '<div class="big">' + total + '<small> / 500</small></div>' +
    '<div class="grid">' + grid + '</div>';
  if (st && st.plays > 1) {
    h += '<div class="statrow">' +
      '<div class="stat"><div class="v">' + st.beat + '%</div><div class="l">players beaten</div></div>' +
      '<div class="stat"><div class="v">' + st.avg + '</div><div class="l">average score</div></div>' +
      '<div class="stat"><div class="v">' + st.plays + '</div><div class="l">plays today</div></div></div>';
  }
  if (S.streak > 1 && D.d === L) h += '<div class="streakline">🔥 ' + S.streak + ' day streak</div>';
  h += '<button class="btn" id="share">Share result</button>' +
    '<div class="count" id="count"></div></div>';
  app.innerHTML = h;
  document.getElementById('share').onclick = function(){
    var txt = 'OffBy #' + D.n + ' - ' + total + '/500' + NL + grid + NL + location.origin + location.pathname;
    if (navigator.share) { navigator.share({ text: txt }).catch(function(){}); }
    else if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){ toast('Copied!'); }); }
  };
  tick();
  setInterval(tick, 1000);
}

function tick(){
  var el = document.getElementById('count');
  if (!el) return;
  var now = new Date();
  var mid = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  var s = Math.floor((mid - now) / 1000);
  var hh = Math.floor(s/3600), mm = Math.floor((s%3600)/60), ss = s%60;
  el.textContent = 'Next puzzle in ' + String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}

fetch(API + '?api=puzzle&d=' + L)
  .then(function(r){ return r.json(); })
  .then(function(data){
    D = data;
    var done = S.hist[D.d];
    if (done) {
      showEnd(done.s, done.g, done.st || null);
      document.getElementById('subtitle').textContent = 'You already played today - see you tomorrow!';
    } else {
      showIntro();
    }
  })
  .catch(function(){
    app.innerHTML = '<div class="card center"><div style="font-size:40px">😵</div><div style="margin-top:10px">Could not load the puzzle. Check your connection and refresh.</div></div>';
  });
</script>
</body>
</html>
